<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { width: 400px; font-family: 'Segoe UI', sans-serif; font-size: 13px; background: #f5f5f5; color: #333; }
    .header {
      background: #4a86e8;
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 15px; font-weight: bold; }
    .header .count { background: rgba(255,255,255,0.25); border-radius: 12px; padding: 2px 10px; font-size: 12px; }
    .status-bar {
      padding: 8px 16px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      font-size: 12px;
      color: #666;
      min-height: 34px;
      display: flex;
      align-items: center;
    }
    .status-bar.error { color: #c0392b; }
    .status-bar.success { color: #27ae60; }
    .btn-row {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
    }
    button {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: bold;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #btn-add { background: #4a86e8; color: white; }
    #btn-download { background: #27ae60; color: white; }
    #btn-clear { background: #e0e0e0; color: #555; flex: 0 0 auto; padding: 8px 10px; }
    .list-container { max-height: 320px; overflow-y: auto; background: #fff; }
    .empty-state { text-align: center; padding: 40px 16px; color: #aaa; font-size: 12px; }
    .product-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid #f0f0f0;
    }
    .product-item:last-child { border-bottom: none; }
    .product-img {
      width: 48px; height: 48px;
      object-fit: cover;
      border-radius: 4px;
      flex-shrink: 0;
      background: #eee;
    }
    .product-info { flex: 1; min-width: 0; }
    .product-name {
      font-size: 12px;
      font-weight: bold;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }
    .product-meta { font-size: 11px; color: #888; display: flex; gap: 8px; flex-wrap: wrap; }
    .badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: bold; background: #fde8d5; color: #ad5f1a; }
    .price { color: #c0392b; font-weight: bold; }
    .shop-code { color: #4a86e8; }
    .btn-remove {
      flex: 0 0 auto;
      background: none;
      color: #ccc;
      font-size: 16px;
      padding: 4px 6px;
      border-radius: 4px;
    }
    .btn-remove:hover { color: #c0392b; background: #fdecea; }
    .footer { padding: 8px 16px; font-size: 11px; color: #aaa; text-align: center; background: #f5f5f5; }
  </style>
</head>
<body>
  <div class="header">
    <h1>🛍 韓国グッズ 商品取得ツール</h1>
    <span class="count" id="item-count">0 件</span>
  </div>

  <div class="status-bar" id="status">対応ショップの商品ページで「追加」を押してください</div>

  <div class="btn-row">
    <button id="btn-add">📋 このページを追加</button>
    <button id="btn-download" disabled>⬇ CSV+画像保存</button>
    <button id="btn-clear" title="リストをクリア">🗑</button>
  </div>

  <div class="list-container" id="list-container">
    <div class="empty-state">まだ商品が追加されていません</div>
  </div>

  <div class="footer">追加した商品をCSV出力し、画像をフォルダへ保存します</div>

  <script src="popup.js"></script>
</body>
</html>
