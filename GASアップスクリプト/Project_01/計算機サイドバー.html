<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; font-size: 13px; color: #222; margin: 0; padding: 10px; }
    h1 { font-size: 15px; margin: 0 0 8px; }
    .tabs { display: flex; border: 1px solid #ccc; border-radius: 6px; overflow: hidden; margin-bottom: 8px; }
    .tabs button { flex: 1; border: none; background: #fff; padding: 6px 0; font-size: 13px; cursor: pointer; color: #555; }
    .tabs button.on { background: #1a73e8; color: #fff; }
    .rate { font-size: 11px; color: #777; margin-bottom: 8px; }
    .box { border: 1px solid #eee; border-radius: 6px; padding: 8px 10px; margin-bottom: 8px; }
    .box .h { font-size: 11px; font-weight: bold; margin-bottom: 6px; }
    .in .h { color: #b8860b; }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 6px; margin: 5px 0; }
    .row label { color: #555; font-size: 12px; }
    .row input { width: 96px; height: 28px; text-align: right; border: 1px solid #ccc; border-radius: 4px; padding: 0 6px; font-size: 13px; background: #FFF9E6; }
    .unit { width: 44px; font-size: 11px; color: #999; }
    .sec { font-size: 11px; font-weight: bold; margin: 8px 0 4px; }
    .sec.rec { color: #137333; }
    .sec.act { color: #1a5fb4; }
    .sec.ref { color: #888; }
    .line { display: flex; justify-content: space-between; padding: 3px 0; font-size: 12px; }
    .line .k { color: #666; }
    .line .v { font-weight: bold; }
    .big { background: #E6F4EA; border-radius: 6px; padding: 8px 10px; margin: 6px 0; }
    .big .l { font-size: 11px; color: #137333; }
    .big .v { font-size: 20px; font-weight: bold; color: #137333; }
    .actbox { background: #E8F0FE; border-radius: 6px; padding: 8px 10px; margin: 6px 0; }
    .actbox .l { font-size: 11px; color: #1a5fb4; }
    .actbox .v { font-size: 20px; font-weight: bold; color: #1a5fb4; }
    .hint { font-size: 10px; color: #888; margin-top: 2px; }
    .sig { display: flex; justify-content: space-between; padding: 6px 10px; border-radius: 6px; margin-top: 6px; font-weight: bold; font-size: 12px; }
    .sig.ok { background: #E8F0FE; color: #1a5fb4; }
    .sig.ng { background: #FCE8E6; color: #C5221F; }
    .refetch { width: 100%; margin-top: 8px; height: 30px; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; font-size: 12px; }
    .note { font-size: 11px; color: #999; margin-top: 8px; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>💴 仕入れ計算機 v2</h1>
  <div class="tabs">
    <button id="t_tw" onclick="setC('tw')">台湾</button>
    <button id="t_kr" onclick="setC('kr')">韓国</button>
    <button id="t_cn" onclick="setC('cn')">中国</button>
  </div>
  <div class="rate" id="rate">レート取得中...</div>
  <div class="box in"><div class="h">✎ 入力（黄色）</div><div id="inputs"></div></div>
  <div id="results"></div>
  <button class="refetch" onclick="loadRates()">↻ レートを再取得</button>
  <div class="note">目標粗利率・うわのせは黄色欄で手入力。初期値は原価帯／推奨。手入力後は自動追従しません。</div>

  <script>
    var rates = { tw: 5.09, kr: 0.105, cn: 23.82, date: '', ok: false };
    var cur = 'tw';
    var goalTouched = { tw: false, kr: false, cn: false };
    var uwaTouched = { tw: false, kr: false, cn: false };

    function goalFromCost(cost) {
      if (cost <= 2000) return 35;
      if (cost <= 6000) return 25;
      if (cost <= 12000) return 20;
      if (cost <= 20000) return 10;
      return 8;
    }

    var cfg = {
      tw: {
        fields: [
          ['price','本の価格','元',820],
          ['rate','レート','円/元',null],
          ['ship','送料率','%',35],
          ['mall','モール手数料','%',9],
          ['tax','消費税','%',10],
          ['goal','目標粗利率','%',null],
          ['uwa','実際のうわのせ','円',null]
        ],
        cost: function(v){ return Math.round((v.price + v.price * v.ship / 100) * v.rate); },
        feeTotal: function(v){ return v.mall / 100 + v.tax / 100; }
      },
      cn: {
        fields: [
          ['price','商品価格','元',37.4],
          ['rate','レート','円/元',null],
          ['ship','送料率','%',30],
          ['mall','モール手数料','%',9],
          ['card','カード手数料','%',3],
          ['tax','消費税','%',10],
          ['goal','目標粗利率','%',null],
          ['uwa','実際のうわのせ','円',null]
        ],
        cost: function(v){ return Math.round((v.price + v.price * v.ship / 100) * v.rate); },
        feeTotal: function(v){ return v.mall / 100 + v.card / 100 + v.tax / 100; }
      },
      kr: {
        fields: [
          ['price','本の価格','W',180900],
          ['weight','重さ','g',300],
          ['rate','レート','円/W',null],
          ['ship','重量係数','',0.6],
          ['mall','モール手数料','%',9],
          ['tax','消費税','%',10],
          ['goal','目標粗利率','%',null],
          ['uwa','実際のうわのせ','円',null]
        ],
        cost: function(v){ return Math.round(v.price * v.rate + (v.weight || 0) * v.ship); },
        feeTotal: function(v){ return v.mall / 100 + v.tax / 100; }
      }
    };

    function yen(v){ return '¥'+Math.round(v).toLocaleString('ja-JP'); }
    function pct(v){ return (v*100).toFixed(1)+'%'; }

    function setC(c){
      cur = c;
      ['tw','kr','cn'].forEach(function(k){ document.getElementById('t_'+k).className = (k===c?'on':''); });
      render();
    }

    function readValues(){
      var v = {};
      cfg[cur].fields.forEach(function(x){
        var el = document.getElementById('f_'+x[0]);
        v[x[0]] = el ? parseFloat(el.value) || 0 : 0;
      });
      return v;
    }

    function preserveField(id, touched){
      var el = document.getElementById(id);
      if (el && touched) return el.value;
      return null;
    }

    function render(){
      var f = cfg[cur].fields;
      var prevGoal = preserveField('f_goal', goalTouched[cur]);
      var prevUwa = preserveField('f_uwa', uwaTouched[cur]);
      document.getElementById('inputs').innerHTML = f.map(function(x){
        var def = x[0]==='rate' ? rates[cur] : x[3];
        if (x[0]==='goal' && prevGoal !== null) def = prevGoal;
        if (x[0]==='uwa' && prevUwa !== null) def = prevUwa;
        var step = (x[2]==='%') ? '0.1' : 'any';
        var val = (def === '' || def === null) ? '' : def;
        return '<div class="row"><label>'+x[1]+'</label><span style="display:flex;align-items:center;gap:6px;">'+
          '<input id="f_'+x[0]+'" type="number" step="'+step+'" value="'+val+'" oninput="onInput(\''+x[0]+'\')"/>'+
          '<span class="unit">'+x[2]+'</span></span></div>';
      }).join('');
      compute(!goalTouched[cur], !uwaTouched[cur]);
    }

    function onInput(key){
      if (key === 'goal') goalTouched[cur] = true;
      if (key === 'uwa') uwaTouched[cur] = true;
      compute(false, false);
    }

    function compute(resetGoal, resetUwa){
      var v = readValues();
      var fee = cfg[cur].feeTotal(v);
      var cost = cfg[cur].cost(v);
      var bandPct = goalFromCost(cost);

      var goalEl = document.getElementById('f_goal');
      if (goalEl && (resetGoal || !goalTouched[cur])) {
        goalEl.value = bandPct;
        v.goal = bandPct;
      }
      var goalPct = v.goal;

      var theory = cost / (1 - goalPct / 100 - fee);
      var sell10 = Math.round(theory / 10) * 10;
      var sell100 = Math.round(theory / 100) * 100;
      var uwa10 = Math.max(0, sell10 - cost);
      var profit10 = sell10 - sell10 * fee - cost;
      var profit100 = sell100 - sell100 * fee - cost;

      var uwaEl = document.getElementById('f_uwa');
      if (uwaEl && (resetUwa || !uwaTouched[cur])) {
        uwaEl.value = uwa10;
        v.uwa = uwa10;
      }

      var actualSell = cost + v.uwa;
      var profit = actualSell - actualSell * fee - cost;
      var profitRate = actualSell > 0 ? profit / actualSell : 0;
      var ok = profitRate >= 0.2;

      document.getElementById('results').innerHTML =
        '<div class="line"><span class="k">原価</span><span class="v">'+yen(cost)+'</span></div>'+
        '<div class="line"><span class="k">原価帯参考粗利率</span><span class="v">'+bandPct+'%</span></div>'+
        '<div class="sec ref">── 原価帯参考: 2千35% / 6千25% / 1.2万20% / 2万10% / 3万8% ──</div>'+
        '<div class="sec rec">── おすすめ（黄色の目標粗利率から・緑）──</div>'+
        '<div class="line"><span class="k">理論売値</span><span class="v">'+yen(theory)+'</span></div>'+
        '<div class="line"><span class="k">おすすめ(10円丸め)</span><span class="v">'+yen(sell10)+'</span></div>'+
        '<div class="big"><div class="l">おすすめ(100円丸め)</div><div class="v">'+yen(sell100)+'</div></div>'+
        '<div class="line"><span class="k">推奨うわのせ(10円)</span><span class="v">'+yen(uwa10)+'</span></div>'+
        '<div class="line"><span class="k">おすすめ時粗利(10円)</span><span class="v">'+yen(profit10)+'</span></div>'+
        '<div class="line"><span class="k">おすすめ時粗利(100円)</span><span class="v">'+yen(profit100)+'</span></div>'+
        '<div class="sec act">── 微調整結果（青）──</div>'+
        '<div class="hint">実際売値 = 原価 + 黄色欄のうわのせ</div>'+
        '<div class="actbox"><div class="l">実際売値</div><div class="v">'+yen(actualSell)+'</div></div>'+
        '<div class="line"><span class="k">実質粗利額</span><span class="v">'+yen(profit)+'</span></div>'+
        '<div class="sig '+(ok?'ok':'ng')+'"><span>'+(ok?'✓':'⚠')+' 実質粗利率</span><span>'+pct(profitRate)+'</span></div>';
    }

    function loadRates(){
      document.getElementById('rate').textContent = 'レート取得中...';
      google.script.run.withSuccessHandler(function(r){
        rates.tw=r.tw; rates.kr=r.kr; rates.cn=r.cn; rates.date=r.date||''; rates.ok=r.ok;
        document.getElementById('rate').textContent = r.ok
          ? 'レート自動取得 ' + (r.date? r.date.replace(/ \d\d:.*$/,'') : '') + '（台'+r.tw+' / 韓'+r.kr+' / 中'+r.cn+'）'
          : 'レート取得失敗 → 手入力してください';
        render();
      }).withFailureHandler(function(){
        document.getElementById('rate').textContent = 'レート取得失敗 → 手入力してください';
        render();
      }).getKeisanRates();
    }

    setC('tw');
    loadRates();
  </script>
</body>
</html>
