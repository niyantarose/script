<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, "Segoe UI", "Hiragino Kaku Gothic ProN", Meiryo, sans-serif; font-size: 15px; color: #222; margin: 0; padding: 12px; }
    h1 { font-size: 18px; margin: 0 0 10px; }
    .tabs { display: flex; border: 1px solid #ccc; border-radius: 6px; overflow: hidden; margin-bottom: 10px; }
    .tabs button { flex: 1; border: none; background: #fff; padding: 10px 0; font-size: 15px; cursor: pointer; color: #555; }
    .tabs button.on { background: #1a73e8; color: #fff; font-weight: bold; }
    .rate { font-size: 13px; color: #555; margin-bottom: 10px; line-height: 1.4; }
    .box { border: 1px solid #ddd; border-radius: 8px; padding: 10px 12px; margin-bottom: 10px; }
    .box .h { font-size: 14px; font-weight: bold; margin-bottom: 8px; }
    .in .h { color: #b8860b; }
    .bandbox { border: 1px solid #e6c87a; background: #fffaf0; }
    .bandbox .h { color: #8a6d1b; }
    .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin: 7px 0; }
    .row label { color: #333; font-size: 14px; flex: 1; }
    .row input { width: 110px; height: 34px; text-align: right; border: 1px solid #ccc; border-radius: 4px; padding: 0 8px; font-size: 15px; background: #FFF9E6; }
    .row input.band-in { background: #FCE8B2; }
    .row input.act-in { background: #E8F0FE; }
    .unit { width: 48px; font-size: 13px; color: #666; }
    .sec { font-size: 14px; font-weight: bold; margin: 10px 0 6px; }
    .big.profit { background: #E8F0FE; }
    .big.profit .l { color: #1a5fb4; }
    .big.profit .v { color: #1a5fb4; }
    .sec.auto { color: #5F6368; }
    .sec.pink { color: #C2185B; }
    .big.band { background: #FCE4EC; }
    .big.band .l { color: #C2185B; }
    .big.band .v { color: #C2185B; }
    .line { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; font-size: 14px; }
    .line .k { color: #555; }
    .line .v { font-weight: bold; font-size: 15px; }
    .big { background: #E6F4EA; border-radius: 8px; padding: 10px 12px; margin: 8px 0; }
    .big .l { font-size: 13px; color: #137333; }
    .big .v { font-size: 24px; font-weight: bold; color: #137333; }
    .actbox { background: #E8F0FE; border-radius: 8px; padding: 10px 12px; margin: 8px 0; }
    .actbox .l { font-size: 13px; color: #1a5fb4; }
    .actbox .v { font-size: 24px; font-weight: bold; color: #1a5fb4; }
    .hint { font-size: 12px; color: #777; margin-top: 4px; }
    .sig { display: flex; justify-content: space-between; padding: 8px 12px; border-radius: 8px; margin-top: 8px; font-weight: bold; font-size: 15px; }
    .sig.ok { background: #E8F0FE; color: #1a5fb4; }
    .sig.ng { background: #FCE8E6; color: #C5221F; }
    .refetch { width: 100%; margin-top: 10px; height: 36px; border: 1px solid #ccc; border-radius: 6px; background: #fff; cursor: pointer; font-size: 14px; }
    .note { font-size: 13px; color: #777; margin-top: 10px; line-height: 1.5; }
  </style>
</head>
<body>
  <h1>💴 仕入れ計算機 v2</h1>
  <div class="tabs">
    <button id="t_tw" onclick="setC('tw')">台湾</button>
    <button id="t_kr" onclick="setC('kr')">韓国</button>
    <button id="t_cn" onclick="setC('cn')">中国</button>
  </div>
  <div class="rate" id="rate">レート取得中...</div>
  <div class="box in"><div class="h">✎ 入力（黄色・毎回ここ）</div><div id="inputs"></div></div>
  <div id="results"></div>
  <div class="box bandbox"><div class="h">⚙ 【別設定】原価帯別の目標粗利率</div><div id="bands"></div>
    <div class="hint">一番下の設定。ここを変えると適用率が自動で変わる</div>
  </div>
  <button class="refetch" onclick="loadRates()">↻ レートを再取得</button>
  <div class="note">おすすめは10円丸めと100円丸め。下に原価帯の自動価格結果あり。</div>

  <script>
    var rates = { tw: 5.09, kr: 0.105, cn: 23.82, date: '', ok: false };
    var cur = 'tw';
    var uwaTouched = { tw: false, kr: false, cn: false };
    var goalTouched = { tw: false, kr: false, cn: false };
    var bands = { g2: 35, g6: 25, g12: 20, g20: 10, g30: 8 };

    function goalFromBands(cost, b) {
      if (cost <= 2000) return b.g2;
      if (cost <= 6000) return b.g6;
      if (cost <= 12000) return b.g12;
      if (cost <= 20000) return b.g20;
      return b.g30;
    }

    var cfg = {
      tw: {
        fields: [
          ['price','本の価格','元',820],
          ['rate','レート','円/元',null],
          ['ship','送料率','%',35],
          ['mall','モール手数料','%',9],
          ['tax','消費税','%',10],
          ['goal','目標粗利率','%',null],
          ['uwa','実際のうわのせ','円',null]
        ],
        cost: function(v){ return Math.round((v.price + v.price * v.ship / 100) * v.rate); },
        feeTotal: function(v){ return v.mall / 100 + v.tax / 100; }
      },
      cn: {
        fields: [
          ['price','商品価格','元',37.4],
          ['rate','レート','円/元',null],
          ['ship','送料率','%',30],
          ['mall','モール手数料','%',9],
          ['card','カード手数料','%',3],
          ['tax','消費税','%',10],
          ['goal','目標粗利率','%',null],
          ['uwa','実際のうわのせ','円',null]
        ],
        cost: function(v){ return Math.round((v.price + v.price * v.ship / 100) * v.rate); },
        feeTotal: function(v){ return v.mall / 100 + v.card / 100 + v.tax / 100; }
      },
      kr: {
        fields: [
          ['price','本の価格','W',180900],
          ['weight','重さ','g',300],
          ['rate','レート','円/W',null],
          ['ship','重量係数','',0.6],
          ['mall','モール手数料','%',9],
          ['tax','消費税','%',10],
          ['goal','目標粗利率','%',null],
          ['uwa','実際のうわのせ','円',null]
        ],
        cost: function(v){ return Math.round(v.price * v.rate + (v.weight || 0) * v.ship); },
        feeTotal: function(v){ return v.mall / 100 + v.tax / 100; }
      }
    };

    var bandFields = [
      ['g2','〜2,000円',35],
      ['g6','〜6,000円',25],
      ['g12','〜12,000円',20],
      ['g20','〜20,000円',10],
      ['g30','20,000円超',8]
    ];

    function yen(v){ return '¥'+Math.round(v).toLocaleString('ja-JP'); }
    function pct(v){ return (v*100).toFixed(1)+'%'; }

    function setC(c){
      cur = c;
      ['tw','kr','cn'].forEach(function(k){ document.getElementById('t_'+k).className = (k===c?'on':''); });
      render();
    }

    function readBands(){
      var b = {};
      bandFields.forEach(function(x){
        var el = document.getElementById('b_'+x[0]);
        b[x[0]] = el ? parseFloat(el.value) || 0 : x[2];
      });
      return b;
    }

    function readValues(){
      var v = {};
      cfg[cur].fields.forEach(function(x){
        var el = document.getElementById('f_'+x[0]);
        v[x[0]] = el ? parseFloat(el.value) || 0 : 0;
      });
      return v;
    }

    function render(){
      var prev = {};
      cfg[cur].fields.forEach(function(x){
        var el = document.getElementById('f_'+x[0]);
        if (el) prev[x[0]] = el.value;
      });
      bandFields.forEach(function(x){
        var el = document.getElementById('b_'+x[0]);
        if (el) bands[x[0]] = parseFloat(el.value) || x[2];
      });

      document.getElementById('inputs').innerHTML = cfg[cur].fields.map(function(x){
        var def = x[0]==='rate' ? rates[cur] : x[3];
        if (x[0]==='uwa' && prev.uwa != null && uwaTouched[cur]) def = prev.uwa;
        if (x[0]==='goal' && prev.goal != null && goalTouched[cur]) def = prev.goal;
        var step = (x[2]==='%') ? '0.1' : 'any';
        var val = (def === '' || def === null) ? '' : def;
        var cls = x[0]==='uwa' ? ' class="act-in"' : '';
        return '<div class="row"><label>'+x[1]+'</label><span style="display:flex;align-items:center;gap:6px;">'+
          '<input id="f_'+x[0]+'" type="number" step="'+step+'" value="'+val+'"'+cls+' oninput="onInput(\''+x[0]+'\')"/>'+
          '<span class="unit">'+x[2]+'</span></span></div>';
      }).join('');

      document.getElementById('bands').innerHTML = bandFields.map(function(x){
        var val = bands[x[0]] != null ? bands[x[0]] : x[2];
        return '<div class="row"><label>'+x[1]+'</label><span style="display:flex;align-items:center;gap:6px;">'+
          '<input id="b_'+x[0]+'" class="band-in" type="number" step="0.1" value="'+val+'" oninput="onBand()"/>'+
          '<span class="unit">%</span></span></div>';
      }).join('');

      if (!uwaTouched[cur] || !goalTouched[cur]) compute(true);
      else compute(false);
    }

    function onBand(){
      goalTouched[cur] = false;
      compute(true);
    }

    function onInput(key){
      if (key === 'uwa') uwaTouched[cur] = true;
      if (key === 'goal') goalTouched[cur] = true;
      compute(false);
    }

    function compute(resetAuto){
      var v = readValues();
      var b = readBands();
      var fee = cfg[cur].feeTotal(v);
      var cost = cfg[cur].cost(v);
      var autoGoal = goalFromBands(cost, b);

      var goalEl = document.getElementById('f_goal');
      if (goalEl && (resetAuto || !goalTouched[cur])) {
        goalEl.value = autoGoal;
        v.goal = autoGoal;
      }

      var goalPct = v.goal;
      var denom = 1 - goalPct / 100 - fee;
      var theory = denom > 0 ? cost / denom : 0;
      var sell10 = Math.round(theory / 10) * 10;
      var sell100 = Math.round(theory / 100) * 100;
      var uwa10 = Math.max(0, sell10 - cost);

      var autoDenom = 1 - autoGoal / 100 - fee;
      var autoTheory = autoDenom > 0 ? cost / autoDenom : 0;
      var auto10 = Math.round(autoTheory / 10) * 10;
      var auto100 = Math.round(autoTheory / 100) * 100;

      var uwaEl = document.getElementById('f_uwa');
      if (uwaEl && (resetAuto || !uwaTouched[cur])) {
        uwaEl.value = uwa10;
        v.uwa = uwa10;
      }

      var actualSell = cost + v.uwa;
      var profit = actualSell - actualSell * fee - cost;
      var profitRate = actualSell > 0 ? profit / actualSell : 0;
      var ok = profitRate >= 0.2;

      document.getElementById('results').innerHTML =
        '<div class="sec act">── 微調整結果（青）──</div>'+
        '<div class="hint">実際売値 = 原価 + 黄色欄のうわのせ</div>'+
        '<div class="actbox"><div class="l">実際売値</div><div class="v">'+yen(actualSell)+'</div></div>'+
        '<div class="big profit"><div class="l">実質粗利額</div><div class="v">'+yen(profit)+'</div></div>'+
        '<div class="sig '+(ok?'ok':'ng')+'"><span>'+(ok?'✓':'⚠')+' 実質粗利率</span><span>'+pct(profitRate)+'</span></div>'+
        '<div class="sec rec">── おすすめ（緑）──</div>'+
        '<div class="line"><span class="k">おすすめ(10円丸め)</span><span class="v">'+yen(sell10)+'</span></div>'+
        '<div class="big"><div class="l">おすすめ(100円丸め)</div><div class="v">'+yen(sell100)+'</div></div>'+
        '<div class="sec pink">── 自動価格計算結果（原価帯）──</div>'+
        '<div class="line"><span class="k">原価帯売値(10円丸め)</span><span class="v">'+yen(auto10)+'</span></div>'+
        '<div class="big band"><div class="l">原価帯売値(100円丸め)</div><div class="v">'+yen(auto100)+'</div></div>'+
        '<div class="sec auto">── 自動計算 ──</div>'+
        '<div class="line"><span class="k">原価</span><span class="v">'+yen(cost)+'</span></div>'+
        '<div class="line"><span class="k">適用目標粗利率(自動)</span><span class="v">'+autoGoal+'%</span></div>';
    }

    function loadRates(){
      document.getElementById('rate').textContent = 'レート取得中...';
      google.script.run.withSuccessHandler(function(r){
        rates.tw=r.tw; rates.kr=r.kr; rates.cn=r.cn; rates.date=r.date||''; rates.ok=r.ok;
        document.getElementById('rate').textContent = r.ok
          ? 'レート自動取得 ' + (r.date? r.date.replace(/ \d\d:.*$/,'') : '') + '（台'+r.tw+' / 韓'+r.kr+' / 中'+r.cn+'）'
          : 'レート取得失敗 → 手入力してください';
        render();
      }).withFailureHandler(function(){
        document.getElementById('rate').textContent = 'レート取得失敗 → 手入力してください';
        render();
      }).getKeisanRates();
    }

    setC('tw');
    loadRates();
  </script>
</body>
</html>
